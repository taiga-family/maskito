name: Build
on:
  pull_request:
  push:
    branches: [main]

jobs:
  build-packages:
    name: Packages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: taiga-family/actions/setup-variables@cae818be1384ee5c94f69548d70ab1f50a8e7f01 # v2.2.0
      - uses: taiga-family/actions/setup-node@cae818be1384ee5c94f69548d70ab1f50a8e7f01 # v2.2.0
      - run: npx nx run-many --target build --all --exclude=demo

  build-demo:
    name: Demo
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: taiga-family/actions/setup-variables@cae818be1384ee5c94f69548d70ab1f50a8e7f01 # v2.2.0
      - uses: taiga-family/actions/setup-node@cae818be1384ee5c94f69548d70ab1f50a8e7f01 # v2.2.0
      - run: npx nx build-gh-pages

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
