<form
    autocomplete="on"
    tuiGroup
    class="wrapper"
    [formGroup]="form"
>
    <tui-textfield class="number">
    <label tuiLabel>Card number</label>
    <input
autocomplete="cc-number"
inputmode="numeric"
placeholder="0000 0000 0000 0000"
tuiInput
[maskito]="cardMask"
formControlName="cardNumber"
/>
    </tui-textfield>
    <tui-textfield class="expired">
    <label tuiLabel>EXP</label>
    <input
autocomplete="cc-exp"
inputmode="numeric"
placeholder="mm/yy"
tuiInput
[maskito]="expiredMask"
formControlName="expire"
/>
    </tui-textfield>
    <tui-textfield class="cvv">
    <label tuiLabel>CVV</label>
    <input
autocomplete="cc-csc"
inputmode="numeric"
placeholder="000"
tuiInput
[maskito]="cvvMask"
formControlName="cvv"
/>
    </tui-textfield>
</form>
