<tui-doc-page
    header="Textarea"
    package="Recipes"
>
    <ng-template pageTab>
        <section>
            <p class="tui-space_top-0 tui-space_bottom-4">
                You can use
                <strong>Maskito</strong>
                with
                <code>HTMLTextAreaElement</code>
                too. API is the same as for
                <code>HTMLInputElement</code>
                .
            </p>

            <tui-doc-code [code]="maskitoWithTextareaDemo" />

            <p class="tui-space_bottom-0">
                Learn more in the
                <a
                    tuiLink
                    [routerLink]="coreConceptsOverviewDocPage"
                >
                    "Core Concepts"
                </a>
                section.
            </p>
        </section>

        <tui-doc-example
            heading="Latin letters and digits"
            [content]="textareaExample1"
        >
            <textarea-doc-example-1 />
        </tui-doc-example>
    </ng-template>
</tui-doc-page>
