<form
    #formElement
    autocomplete="on"
    class="tui-form"
    [formGroup]="form"
    (ngSubmit)="log(form.value); formElement.submit()"
>
    <h3 class="tui-form__header tui-form__header_margin-top_none">Real World Form</h3>
    <div class="tui-form__row tui-form__row_multi-fields">
        <tui-textfield class="tui-form__multi-field">
        <label tuiLabel>Name</label>
        <input
                autocomplete="name"
                name="name"
                placeholder="Only latin letters"
                tuiInput
                [maskito]="nameMask" formControlName="name"/>
        </tui-textfield>
        <tui-textfield class="tui-form__multi-field">
        <label tuiLabel>Surname</label>
        <input
                autocomplete="family-name"
                name="surname"
                placeholder="Only CAPITAL latin letters"
                tuiInput
                [maskito]="surnameMask" formControlName="surname"/>
        </tui-textfield>
    </div>

    <div class="tui-form__row">
        <tui-textfield>
        <label tuiLabel>Enter phone number</label>
        <input
                autocomplete="tel"
                inputmode="tel"
                name="phone"
                tuiInput
                [attr.pattern]="phonePattern"
                [maskito]="phoneMask" formControlName="phone"/>

        <tui-icon
            *polymorpheusOutlet="countryIsoCode ? flag : '@tui.phone' as src"
            [icon]="src"
        />
        </tui-textfield>

        <ng-template #flag>
            <img
                width="28"
                [attr.alt]="countryIsoCode"
                [src]="countryIsoCode | tuiFlag"
                [style.border-radius.%]="50"
            />
        </ng-template>
    </div>

    <div class="tui-form__row tui-form__row_multi-fields">
        <tui-textfield class="tui-form__multi-field">
        <label tuiLabel>Enter password</label>
        <input
                autocomplete="new-password"
                name="password"
                placeholder="Only digits and one latin letter"
                tuiInput
                [maskito]="passwordMask"
                [type]="showPassword ? 'password' : 'text'" formControlName="password"/>

        <tui-icon
            *polymorpheusOutlet="showHideIcon as src"
            [icon]="src"
        />
        </tui-textfield>
        <tui-textfield class="tui-form__multi-field">
        <label tuiLabel>Repeat password</label>
        <input
                autocomplete="new-password"
                name="repeatPassword"
                placeholder="Only digits and one latin letter"
                tuiInput
                [maskito]="passwordMask"
                [type]="showPassword ? 'password' : 'text'" formControlName="repeatedPassword"/>

        <tui-icon
            *polymorpheusOutlet="showHideIcon as src"
            [icon]="src"
        />
        </tui-textfield>

        <ng-template #showHideIcon>
            <tui-icon
                class="password-icon"
                [icon]="showPassword ? '@tui.eye' : '@tui.eye-off'"
                (click)="showPassword = !showPassword"
            />
        </ng-template>
    </div>

    <div class="tui-form__row tui-form__row_multi-fields">
        <tui-textfield class="tui-form__multi-field">
        <label tuiLabel>Transaction date</label>
        <input
                inputmode="decimal"
                name="transactionDate"
                placeholder="dd.mm.yyyy"
                tuiInput
                [maskito]="transactionDateMask" formControlName="transactionDate"/>

        <tui-icon icon="@tui.calendar" />
        </tui-textfield>

        <tui-textfield class="tui-form__multi-field">
        <label tuiLabel>Transaction amount</label>
        <input
                autocomplete="transaction-amount"
                inputmode="decimal"
                name="transactionAmount"
                placeholder="Enter amount"
                tuiInput
                [maskito]="transactionAmountMask" formControlName="transactionAmount"/>
        </tui-textfield>
    </div>

    <div class="tui-form__row">
        <!-- TODO: (Taiga UI migration) tui-textarea migration (see https://taiga-ui.dev/components/textarea):
     - [expandable] was removed. New component always auto-resizes between [min] (default: 1) and [max] (default: 3) rows.
-->
        <tui-textfield>
        <label tuiLabel>Enter address</label>
        <textarea
                autocomplete="street-address"
                name="address"
                placeholder="Only latin letters, digits and some punctuation signs are allowed"
                tuiTextarea
                [maskito]="addressMask" formControlName="address"></textarea>
        </tui-textfield>
    </div>

    <div class="tui-form__buttons">
        <button
            size="l"
            tuiButton
            type="submit"
            class="tui-form__button"
        >
            Submit
        </button>

        <button
            appearance="flat"
            size="l"
            tuiButton
            type="button"
            class="tui-form__button"
            (click)="form.reset()"
        >
            Clear all
        </button>
    </div>
</form>
