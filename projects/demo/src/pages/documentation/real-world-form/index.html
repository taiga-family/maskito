<form
    #formElement
    autocomplete="on"
    class="tui-form"
    [formGroup]="form"
    (ngSubmit)="log(form.value); formElement.submit()"
>
    <h3 class="tui-form__header tui-form__header_margin-top_none">Real World Form</h3>
    <div class="tui-form__row tui-form__row_multi-fields">
        <tui-textfield class="tui-form__multi-field">
            <label tuiLabel>Name</label>
            <input
                autocomplete="name"
                formControlName="name"
                name="name"
                placeholder="Only latin letters"
                tuiInput
                [maskito]="nameMask"
            />
        </tui-textfield>
        <tui-textfield class="tui-form__multi-field">
            <label tuiLabel>Surname</label>
            <input
                autocomplete="family-name"
                formControlName="surname"
                name="surname"
                placeholder="Only CAPITAL latin letters"
                tuiInput
                [maskito]="surnameMask"
            />
        </tui-textfield>
    </div>

    <div class="tui-form__row">
        <tui-textfield>
            <label tuiLabel>Enter phone number</label>
            <input
                autocomplete="tel"
                formControlName="phone"
                inputmode="tel"
                name="phone"
                tuiInput
                [attr.pattern]="phonePattern"
                [maskito]="phoneMask"
            />

            @if (countryIsoCode) {
                <img
                    width="28"
                    [attr.alt]="countryIsoCode"
                    [src]="countryIsoCode | tuiFlag"
                    [style.border-radius.%]="50"
                />
            } @else {
                <tui-icon icon="@tui.phone" />
            }
        </tui-textfield>
    </div>

    <div class="tui-form__row tui-form__row_multi-fields">
        <tui-textfield class="tui-form__multi-field">
            <label tuiLabel>Enter password</label>
            <input
                autocomplete="new-password"
                formControlName="password"
                name="password"
                placeholder="Only digits and one latin letter"
                tuiInput
                type="password"
                [maskito]="passwordMask"
            />

            <tui-icon tuiPassword />
        </tui-textfield>
        <tui-textfield class="tui-form__multi-field">
            <label tuiLabel>Repeat password</label>
            <input
                autocomplete="new-password"
                formControlName="repeatedPassword"
                name="repeatPassword"
                placeholder="Only digits and one latin letter"
                tuiInput
                type="password"
                [maskito]="passwordMask"
            />

            <tui-icon tuiPassword />
        </tui-textfield>
    </div>

    <div class="tui-form__row tui-form__row_multi-fields">
        <tui-textfield
            iconEnd="@tui.calendar"
            class="tui-form__multi-field"
        >
            <label tuiLabel>Transaction date</label>
            <input
                formControlName="transactionDate"
                inputmode="decimal"
                name="transactionDate"
                placeholder="dd.mm.yyyy"
                tuiInput
                [maskito]="transactionDateMask"
            />
        </tui-textfield>

        <tui-textfield class="tui-form__multi-field">
            <label tuiLabel>Transaction amount</label>
            <input
                autocomplete="transaction-amount"
                formControlName="transactionAmount"
                inputmode="decimal"
                name="transactionAmount"
                placeholder="Enter amount"
                tuiInput
                [maskito]="transactionAmountMask"
            />
        </tui-textfield>
    </div>

    <div class="tui-form__row">
        <tui-textfield>
            <label tuiLabel>Enter address</label>
            <textarea
                autocomplete="street-address"
                formControlName="address"
                name="address"
                placeholder="Only latin letters, digits and some punctuation signs are allowed"
                tuiTextarea
                [maskito]="addressMask"
                [min]="3"
            ></textarea>
        </tui-textfield>
    </div>

    <div class="tui-form__buttons">
        <button
            size="l"
            tuiButton
            type="submit"
            class="tui-form__button"
        >
            Submit
        </button>

        <button
            appearance="flat"
            size="l"
            tuiButton
            type="button"
            class="tui-form__button"
            (click)="form.reset()"
        >
            Clear all
        </button>
    </div>
</form>
