<tui-doc-main>
    <ng-container ngProjectAs="tuiDocHeader">
        <a
            appearance="icon"
            href="https://github.com/taiga-family/maskito"
            iconStart="assets/icons/github.svg"
            rel="noreferrer"
            target="_blank"
            title="Maskito source code on GitHub"
            tuiLink
            class="action"
        ></a>

        <a
            appearance="icon"
            href="https://t.me/taiga_ui/10600"
            iconStart="assets/icons/telegram.svg"
            rel="noreferrer"
            target="_blank"
            title="Get help on Telegram"
            tuiLink
            class="action"
        ></a>

        <a
            appearance="icon"
            iconStart="assets/icons/stackblitz.svg"
            title="Maskito StackBlitz Starter"
            tuiLink
            class="action"
            [routerLink]="stackblitzStarterPath"
        ></a>

        <button
            appearance="icon"
            size="xs"
            tuiIconButton
            type="button"
            class="action"
            [iconStart]="darkMode() ? '@tui.sun' : '@tui.moon'"
            (click)="darkMode.set(!darkMode())"
        >
            Switch between dark and light mode
        </button>
    </ng-container>
</tui-doc-main>
